name: Build Windows Screen Auto Clicker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows-exe:
    runs-on: windows-latest  # 使用Windows构建环境
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python==4.8.1.78
        pip install pyautogui==0.9.54
        pip install numpy==1.24.3
        pip install pyinstaller==5.13.2
        pip install pillow==10.0.1
      
    - name: Verify installation
      run: |
        python --version
        pip list
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --name ScreenAutoClicker --console screen_autoclicker.py
        echo "EXE build completed"
        
    - name: List build artifacts
      run: |
        dir dist\
        echo "EXE file size:"
        ls -la dist/ScreenAutoClicker.exe
        
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScreenAutoClicker-Windows-EXE
        path: dist/ScreenAutoClicker.exe
        
    - name: Upload build report
      run: |
        echo "Build completed at $(date)" > build-report.txt
        echo "Python version: $(python --version)" >> build-report.txt
        echo "EXE size: $(ls -la dist/ScreenAutoClicker.exe | awk '{print $5}')" >> build-report.txt
      
    - name: Upload build report artifact
      uses: actions/upload-artifact@v4
      with:
        name: Build-Report
        path: build-report.txt